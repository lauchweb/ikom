<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Website title -->
  <title>Mo Endemik</title>

  <!-- Meta description -->
  <meta name="description" content="Mo Endemik Official Website">

  <!-- Optional better font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #f7f7f7;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      color: #111;
    }

    /* Header section (top-left layout) */
    .header {
      padding: 30px 40px;
    }

    /* Main title */
    .title {
      font-size: 34px;
      font-weight: 800;
      color: #0000cc; /* strong deep blue */
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* Subtitle */
    .subtitle {
      margin: 8px 0 0 0;
      font-size: 16px;
      font-weight: 400;
      color: #555555;
    }

    /* Small hover effect for polish */
    .title:hover {
      color: #001a99;
      transition: 0.2s;
    }
  </style>
</head>
<body>

  <!-- Top-left content -->
  <div class="header">
    <h1 class="title">Mo Endemik</h1>
    <p class="subtitle">earth</p>
  </div>

</body>
</html>

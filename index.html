<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ME</title>

  <style>
    body {
      margin: 0;
      background-color: #f7f9ff;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 30px 40px;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      color: #1e5eff;
      margin: 0;
    }

    .subtitle {
      margin: 8px 0 0 0;
      font-size: 16px;
      color: #555;
    }

    .content {
      flex: 1;
    }

    footer {
      background-color: #e5edff;
      color: #1e5eff;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      border-top: 1px solid #cddcff;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1 class="title">ME</h1>
    <p class="subtitle">Earth</p>
  </div>

  <div class="content"></div>

  <footer>
    © ME 2026
  </footer>

</body>
</html>

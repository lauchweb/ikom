<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ME Official Website</title>
  <meta name="description" content="ME Official Website">

  <style>
    body {
      margin: 0;
      background-color: #f7f7f7;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .header {
      padding: 30px 40px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      color: #123996;
      margin: 0;
    }

    .subtitle {
      margin: 8px 0 0 0;
      font-size: 16px;
      color: #555;
    }

    .spacer {
      flex: 1;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      background: transparent;
    }

    .footer-pc {
      color: #555;
      font-weight: 400;
    }

    .footer-me {
      color: #123996;
      font-weight: 700;
    }

    /* NAVIGATION */
    .nav {
      position: absolute;
      top: 30px;
      right: 40px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 30px;
      font-size: 24px;
      font-weight: 400;
      font-family: Arial, sans-serif;
    }

    .help {
      color: #123996;
    }

    .info,
    .about {
      color: #555;
    }

    @media (max-width: 600px) {
      .header {
        padding: 20px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .nav {
        top: 20px;
        right: 20px;
        font-size: 18px;
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1 class="title">ME</h1>
    <p class="subtitle">MEF</p>
  </div>

  <div class="nav">
    <div class="help">Help</div>
    <div class="info">Info</div>
    <div class="about">About</div>
  </div>

  <div class="spacer"></div>

  <footer>
    <span class="footer-pc">PC ©</span>
    <span class="footer-me">ME</span>
    <span class="footer-2026">2026</span>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ME Official Website</title>
  <meta name="description" content="ME Official Website">

  <style>
    body {
      margin: 0;
      background-color: #f7f7f7;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 30px 40px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      color: #123996; /* Blue */
      margin: 0;
    }

    .subtitle {
      margin: 8px 0 0 0;
      font-size: 16px;
      color: #555; /* Grey */
    }

    .spacer {
      flex: 1; 
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      background: transparent;
      /* removed font-weight here */
    }

    .footer-pc {
      color: #555; /* same as subtitle */
      font-weight: 400; /* normal */
    }

    .footer-me {
      color: #123996; /* same as title */
      font-weight: 700; /* bold only for ME */
    }
  </style>
</head>

<body>

  <div class="header">
    <h1 class="title">ME</h1>
    <p class="subtitle">MEF</p>
  </div>

  <div class="spacer"></div>

  <footer>
    <span class="footer-pc">PC © 2026</span>
    <span class="footer-me"> ME</span>
  </footer>

</body>

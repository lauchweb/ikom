<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Website title -->
  <title>ME</title>

  <!-- Meta description -->
  <meta name="description" content="ME Official Website">

  <!-- Author -->
  <meta name="author" content="ME">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #f7f7f7;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      color: #111;
    }

    /* Header (top-left layout, no divider) */
    .header {
      padding: 60px 80px;
    }

    /* Title */
    .title {
      font-size: 40px;
      font-weight: 800;
      color: #1a3cff;
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* Subtitle */
    .subtitle {
      margin: 12px 0 0 0;
      font-size: 18px;
      font-weight: 400;
      color: #555555;
    }

    /* Hover effect */
    .title:hover {
      color: #001a99;
      transition: 0.2s;
    }

    /* Main content */
    .main {
      padding: 40px 80px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1 class="title">ME</h1>
    <p class="subtitle">earth</p>
  </div>

  <!-- Main section -->
  <main class="main">
    <p>Welcome to ME Official Website.</p>
  </main>

</body>
</html>
